<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAT & ACT Combined Diagnostic</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; }
  a { color: inherit; }

  .app { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  .cover { text-align: center; padding: 3rem 2rem; }
  .cover h1 { font-size: 28px; font-weight: 500; margin-bottom: .5rem; }
  .cover p { font-size: 15px; color: #666; margin-bottom: 2rem; max-width: 540px; margin-left: auto; margin-right: auto; }
  .cover-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-primary { background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 15px; cursor: pointer; font-family: inherit; }
  .btn-primary:hover { opacity: .85; }
  .btn-outline { background: transparent; color: #1a1a1a; border: 1px solid #ccc; border-radius: 8px; padding: 10px 24px; font-size: 15px; cursor: pointer; font-family: inherit; }
  .btn-outline:hover { background: #f0efe9; }

  .section-header { display: flex; align-items: center; gap: 12px; margin: 2rem 0 1rem; padding-bottom: .75rem; border-bottom: 1px solid #e0ddd5; }
  .section-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; letter-spacing: .04em; }
  .badge-reading { background: #ddeeff; color: #1a4a7a; }
  .badge-math { background: #ddf0dd; color: #1a5c1a; }
  .badge-science { background: #fff0cc; color: #7a5000; }
  .section-header h2 { font-size: 18px; font-weight: 500; }

  .concept-block { background: #fff; border: 1px solid #e0ddd5; border-radius: 12px; margin-bottom: 1.5rem; overflow: hidden; }
  .concept-title { background: #f8f7f3; padding: .75rem 1.25rem; font-size: 14px; font-weight: 500; color: #444; border-bottom: 1px solid #e0ddd5; }

  .question-grid { display: grid; grid-template-columns: 1fr 1fr; }
  .question-col { padding: 1.25rem; }
  .question-col:first-child { border-right: 1px solid #e0ddd5; }
  .col-header { font-size: 11px; font-weight: 600; letter-spacing: .06em; color: #999; margin-bottom: 1rem; }
  .col-tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; margin-right: 6px; }
  .tag-sat { background: #ddeeff; color: #185fa5; }
  .tag-act { background: #fde8f0; color: #8c2456; }

  .diff-row { margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid #f0ede5; }
  .diff-row:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .diff-label { font-size: 10px; font-weight: 600; letter-spacing: .05em; color: #999; margin-bottom: .5rem; display: flex; align-items: center; gap: 6px; }
  .diff-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-easy { background: #4a9e3f; }
  .dot-medium { background: #c47a15; }
  .dot-hard { background: #b03030; }

  .q-passage { font-size: 12px; line-height: 1.7; color: #555; background: #f8f7f3; border-left: 3px solid #ddd; padding: .65rem .85rem; margin-bottom: .75rem; border-radius: 0 4px 4px 0; }
  .q-text { font-size: 13px; line-height: 1.6; color: #1a1a1a; margin-bottom: .75rem; font-weight: 500; }

  .options { display: flex; flex-direction: column; gap: 6px; }
  .option-btn { display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px; border-radius: 8px; border: 1px solid #e0ddd5; background: transparent; cursor: pointer; font-family: inherit; font-size: 13px; text-align: left; color: #1a1a1a; transition: background .1s, border-color .1s; width: 100%; line-height: 1.5; }
  .option-btn:hover { background: #f8f7f3; border-color: #ccc; }
  .option-btn.selected { border-color: #3380cc; background: #e8f1fb; color: #0a2a55; }
  .option-btn.correct { border-color: #4a9e3f; background: #e8f5e5; color: #1a4a15; }
  .option-btn.incorrect { border-color: #b03030; background: #fce8e8; color: #5a0f0f; }
  .opt-letter { font-weight: 600; min-width: 16px; flex-shrink: 0; }

  .timing-row { display: flex; align-items: center; gap: 12px; padding: .75rem 1.25rem; border-top: 1px solid #e0ddd5; background: #f8f7f3; flex-wrap: wrap; }
  .timing-label { font-size: 13px; color: #666; white-space: nowrap; }
  .timing-options { display: flex; gap: 6px; flex-wrap: wrap; }
  .timing-btn { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 1px solid #ddd; background: transparent; cursor: pointer; font-family: inherit; color: #666; transition: background .1s; }
  .timing-btn:hover { background: #fff; }
  .timing-btn.selected { background: #1a1a1a; color: #fff; border-color: transparent; }

  .submit-zone { text-align: center; margin: 2.5rem 0; }
  .submit-btn { background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 13px 40px; font-size: 16px; cursor: pointer; font-family: inherit; }
  .submit-btn:hover { opacity: .85; }
  .submit-btn:disabled { opacity: .35; cursor: default; }

  .progress-wrap { width: 100%; height: 4px; background: #e0ddd5; border-radius: 2px; margin-bottom: 1.5rem; }
  .progress-bar { height: 4px; background: #1a1a1a; border-radius: 2px; transition: width .3s; }
  .progress-meta { display: flex; justify-content: space-between; margin-bottom: 1.5rem; font-size: 13px; color: #888; }

  .results-page { animation: fadeIn .3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .results-header { text-align: center; margin-bottom: 2rem; }
  .results-header h1 { font-size: 24px; font-weight: 500; margin-bottom: .5rem; }
  .results-header p { font-size: 15px; color: #666; }

  .score-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 2rem; }
  .score-card { background: #f8f7f3; border-radius: 8px; padding: 1rem; text-align: center; }
  .score-card.highlight { background: #fff; border: 1px solid #e0ddd5; }
  .sc-label { font-size: 12px; color: #888; margin-bottom: .3rem; }
  .sc-value { font-size: 26px; font-weight: 500; }
  .sc-sub { font-size: 12px; color: #888; margin-top: .2rem; }

  .results-section { margin-bottom: 1.75rem; }
  .results-section h3 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }

  .concept-result-row { display: flex; align-items: center; gap: 10px; padding: .6rem .85rem; border-radius: 8px; margin-bottom: .4rem; background: #fff; border: 1px solid #e8e5dd; }
  .cr-section { font-size: 11px; color: #aaa; min-width: 60px; flex-shrink: 0; }
  .cr-name { font-size: 13px; flex: 1; }
  .cr-dots { display: flex; gap: 3px; flex-shrink: 0; }
  .cr-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid #ddd; flex-shrink: 0; }
  .cr-dot.c { background: #4a9e3f; border-color: #4a9e3f; }
  .cr-dot.i { background: #e04040; border-color: #e04040; }
  .cr-dot.s { background: #ccc; border-color: #ccc; }
  .cr-pct { font-size: 13px; font-weight: 500; min-width: 36px; text-align: right; flex-shrink: 0; }
  .pct-s { color: #2a7a20; }
  .pct-o { color: #b06010; }
  .pct-w { color: #aa2020; }

  .diff-breakdown { background: #fff; border: 1px solid #e0ddd5; border-radius: 12px; padding: 1rem 1.25rem; }
  .diff-bar-row { margin-bottom: .85rem; }
  .diff-bar-row:last-child { margin-bottom: 0; }
  .diff-bar-meta { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .diff-bar-track { height: 6px; background: #f0ede5; border-radius: 3px; }
  .diff-bar-fill { height: 6px; border-radius: 3px; transition: width .5s ease; }

  .dot-legend { background: #f8f7f3; border-radius: 8px; padding: .85rem 1rem; margin-top: 1.25rem; font-size: 12px; color: #666; }
  .dot-legend-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: .5rem; align-items: center; }

  .retry-zone { text-align: center; margin-top: 2rem; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

  @media (max-width: 620px) {
    .question-grid { grid-template-columns: 1fr; }
    .question-col:first-child { border-right: none; border-bottom: 1px solid #e0ddd5; }
    .timing-row { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="app" id="root"></div>
<script>
const QUESTIONS = {
  reading: [
    {
      id:"r_vocab", concept:"Vocab in Context", section:"Reading",
      sat:{
        easy:{id:"sv1",passage:"The spacecraft OSIRIS-REx briefly made contact with the asteroid 101955 Bennu in 2020. NASA scientist Daniella DellaGiustina reports that despite facing the unexpected obstacle of a surface mostly covered in boulders, OSIRIS-REx successfully _______ a sample of the surface, gathering pieces of it to bring back to Earth.",question:"Which choice completes the text with the most logical and precise word or phrase?",options:["attached","collected","followed","replaced"],answer:"B",points:1},
        medium:{id:"sv2",passage:"Damage from tropical storms is more often caused by flood water than by high winds. The storms push a wall of water, called a storm surge, ahead of them that washes over coastal land. Flooding can be _______ when the storm surge arrives at high tide, when water levels on the coasts are already at their highest for that day.",question:"Which choice completes the text with the most logical and precise word or phrase?",options:["aggravated","irritated","improved","assisted"],answer:"A",points:2},
        hard:{id:"sv3",passage:"It is by no means _______ to recognize the influence of Dutch painter Hieronymus Bosch on Ali Banisadr's paintings; indeed, Banisadr himself cites Bosch as an inspiration. However, some scholars have suggested that the ancient Mesopotamian poem Epic of Gilgamesh may have had a far greater impact on Banisadr's work.",question:"Which choice completes the text with the most logical and precise word or phrase?",options:["substantial","satisfying","unimportant","appropriate"],answer:"A",points:2.5}
      },
      act:{
        easy:{id:"av1",passage:"He started a recording studio called Sound Ideas, which trawled local talent for the makings of a hit song, but he found the pickings slim.",question:"As used in the passage, \"trawled\" most nearly means:",options:["Trained and developed","Searched widely through","Competed against","Celebrated and promoted"],answer:"B",points:1},
        medium:{id:"av2",passage:"Holmes insists on making music. During performances, he lets his musicians take the lead and uses specialized, stripped-down tracks, called digital sequences, to set the tempo and fill in musical parts when necessary, ultimately preferring the messy alchemy of live music to something more canned.",question:"As used in the passage, \"canned\" most nearly means:",options:["Stored in a container for later use","Dismissed or rejected outright","Pre-recorded and artificially produced","Carefully planned and rehearsed"],answer:"C",points:2},
        hard:{id:"av3",passage:"Washington looked, to Holmes, like a good place to be an ambitious, career-minded black man, but it also had a thriving music scene in nightclubs and hotel lounges, and the next 15 years played out as a sort of tussle between his creative pursuits and his more business-driven impulses.",question:"As used in the passage, \"tussle\" most nearly means:",options:["A physical confrontation between two opponents","A prolonged and unresolved struggle between competing forces","A formal negotiation between two parties","A brief and inconsequential disagreement"],answer:"B",points:2.5}
      }
    },
    {
      id:"r_detail", concept:"Detail & Evidence Questions", section:"Reading",
      sat:{
        easy:{id:"sd1",passage:"A study by a team including finance professor Madhu Veeraraghavan suggests that exposure to sunshine during the workday can lead to overly optimistic behavior. Using data spanning from 1994 to 2010 for a set of US companies, the team compared over 29,000 annual earnings forecasts to the actual earnings later reported by those companies.",question:"Which choice best states the function of the underlined sentence in the overall structure of the text?",options:["To summarize the results of the team's analysis","To present a specific example that illustrates the study's findings","To explain part of the methodology used in the team's study","To call out a challenge the team faced in conducting its analysis"],answer:"C",points:1},
        medium:{id:"sd2",passage:"Born in 1891 to a Quechua-speaking family in the Andes Mountains of Peru, Martín Chambi is today considered to be one of the most renowned figures of Latin American photography. A student claims that Chambi's photographs have considerable ethnographic value — in his work, Chambi was able to capture diverse elements of Peruvian society, representing his subjects with both dignity and authenticity.",question:"Which finding, if true, would most directly support the student's claim?",options:["Chambi took many commissioned portraits of wealthy Peruvians, but he also produced hundreds of images carefully documenting the peoples, sites, and customs of Indigenous communities of the Andes.","Chambi's photographs demonstrate a high level of technical skill, as seen in his strategic use of illumination to create dramatic light and shadow contrasts.","During his lifetime, Chambi was known and celebrated both within and outside his native Peru, as his work was published in places like Argentina, Spain, and Mexico.","Some of the peoples and places Chambi photographed had long been popular subjects for Peruvian photographers."],answer:"A",points:2},
        hard:{id:"sd3",passage:"Text 1: Conventional wisdom long held that human social systems evolved in stages, beginning with hunter-gatherers forming small bands of members with roughly equal status. Text 2: In a 2021 book, anthropologist David Graeber and archaeologist David Wengrow maintain that humans have always been socially flexible, alternately forming systems based on hierarchy and collective ones with decentralized leadership.",question:"Based on the texts, how would Graeber and Wengrow (Text 2) most likely respond to the \"conventional wisdom\" presented in Text 1?",options:["By conceding the importance of hierarchical systems but asserting the greater significance of decentralized collective societies","By disputing the idea that developments in social structures have followed a linear progression through distinct stages","By acknowledging that hierarchical roles likely weren't a part of social systems before the rise of agriculture","By challenging the assumption that groupings of hunter-gatherers were among the earliest forms of social structure"],answer:"B",points:2.5}
      },
      act:{
        easy:{id:"ad1",question:"Based on the Holmes passage, the main reason Holmes eventually preferred playing music at weddings and private parties to playing in clubs was that:",options:["He could play a wider variety of music at weddings and private parties","Audiences at weddings and private parties were easier to please","Weddings and private parties were more profitable","Weddings and private parties required less travel"],answer:"C",points:1},
        medium:{id:"ad2",question:"It can most reasonably be inferred from the passage that Holmes's band members like playing music with Holmes in part because, in contrast to other band leaders, Holmes:",options:["Is familiar with big band, classical, and country music","Allows band members to showcase their talents during gigs","Played music in the Washington club scene for fifteen years","Uses sophisticated elements like digital sequences during gigs"],answer:"B",points:2},
        hard:{id:"ad3",question:"Based on the passage, the residents of Gordon Heights in the 1950s and 1960s would best be described as:",options:["Artistic and sophisticated","Driven and optimistic","Friendly and easygoing","Generous and dependable"],answer:"B",points:2.5}
      }
    },
    {
      id:"r_main", concept:"Main Idea & Structure", section:"Reading",
      sat:{
        easy:{id:"sm1",passage:"The following text is from Charlotte Forten Grimké's 1888 poem \"At Newport.\"\n\nOh, deep delight to watch the gladsome waves / Exultant leap upon the rugged rocks; / Ever repulsed, yet ever rushing on— / Filled with a life that will not know defeat;",question:"Which choice best describes the function of the underlined portion in the text as a whole?",options:["It portrays the surroundings as an imposing and intimidating scene.","It characterizes the sea's waves as a relentless and enduring force.","It conveys the speaker's ambivalence about the natural world.","It draws a contrast between the sea's waves and the speaker's thoughts."],answer:"B",points:1},
        medium:{id:"sm2",passage:"The eminence of the U.S. public university network stretches beyond the United States. Students travel from across the globe to study at top programs. Cutting-edge schools like the University of Virginia (UVA) and the University of California at Los Angeles (UCLA) receive continual international attention for their accomplishments in scholarship and research.",question:"Which choice best states the main idea of the text?",options:["Universities such as UVA and UCLA produce world-class scholars.","Faculty from foreign universities participate in global conversations.","U.S. public universities are respected throughout the world.","Most international students consider UCLA their top school choice."],answer:"C",points:2},
        hard:{id:"sm3",passage:"A new theory may shed light on several phenomena of the planet Saturn that astronomers could not previously explain. Scientists now theorize that an additional moon called Chrysalis orbited Saturn until approximately 160 million years ago, when its orbit destabilized and the moon scraped the planet. The remnants of the crashed moon could be the source of Saturn's rings, icy debris that orbits the planet.",question:"Which choice best states the main idea of the text?",options:["A new astronomical theory exists that concerns the existence of a former moon of Saturn named Chrysalis that crashed into the planet.","The exact date of Saturn's formation is undetermined, but astronomers estimate that the debris in its rings collected 100 million years ago.","Scientists have a possible understanding of Saturn's rings and its tilt based on a new theory about one of its moons.","Saturn's former moon Chrysalis is believed to have had an influence on Saturn's particular tilt on its axis."],answer:"C",points:2.5}
      },
      act:{
        easy:{id:"am1",question:"Which of the following best describes the development of the Holmes passage?",options:["A careful analysis of the music industry to a description of success within it","The upbringing of a specific musician to how they found success within the music industry","A warning about the excess of fame to the consequences of following through without a plan","A cheerful retelling of an upbringing to a didactic analysis of working musicians"],answer:"B",points:1},
        medium:{id:"am2",question:"The main idea of the fourth paragraph (lines 23–31) of the Holmes passage is that:",options:["Holmes was better at playing music than he was at promoting his band.","Holmes's band was able to earn money despite having a limited repertoire.","Holmes's band became a national phenomenon despite the band members' lack of musical talent.","Holmes would have had more success early on if he had taken the time to learn more songs."],answer:"B",points:2},
        hard:{id:"am3",question:"One theme of the Holmes passage is that:",options:["One's previous experiences and pursuits can be useful in achieving success.","Talent is the most important factor in achieving success in both business and music.","Recognizing one's limitations is necessary in overcoming one's failures.","Pursuing one's dreams should take precedence over more practical matters."],answer:"A",points:2.5}
      }
    },
    {
      id:"r_evid", concept:"Evidence & Reasoning", section:"Reading",
      sat:{
        easy:{id:"se1",passage:"Creepypastas are a type of internet folklore that focuses on horror, with topics ranging from incomprehensible supernatural beings to liminal space. In contrast to the elaborate single-author horror novels of the twentieth century, creepypastas _______.",question:"Which choice most logically completes the text?",options:["focus on scares that appeal to the modern youth, such as liminal space, which is akin to endless hallways stretching out to an uncertain destination.","more closely resemble internet memes, with multiple creators offering their own spin on a simple core concept.","have more in common with the scary stories of previous generations, with their focus on ghosts and monsters.","avoid the use of monsters in favor of topics that focus on real-world horrors."],answer:"B",points:1},
        medium:{id:"se2",passage:"Solo concert pianists, by convention, are not permitted to use musical scores during their performances. However, most members of chamber groups and orchestras are permitted to use sheet music during performances. The piano soloist is expected to know both the piano score and the orchestral score by heart. This allows for a high degree of collaboration. The orchestra does not move in lockstep behind the piano soloist. Instead, the soloist _______.",question:"Which choice most logically completes the text?",options:["is considered more experienced than typical members of the orchestra, who require a musical score.","uses a musical score in the same way as does a member of a chamber group or orchestra.","deals with a less complex instrument as a single performer, while the orchestra must manage mass coordination despite boasting a variety of instruments.","is expected to adjust their performance to best match the orchestra and the acoustics of the hall."],answer:"D",points:2},
        hard:{id:"se3",passage:"Professional line standers are paid to wait in a queue in someone else's place. Line-standing also occurs in the U.S. capitol, where political lobbyists have engaged in paying others to queue for them to gain entry to political processes such as Supreme Court hearings. Based on a recent series of interviews with several politicians in Washington, D.C., a journalist claims that lobbyist line-standing draws criticism due to concerns that it undermines the fairness of political processes.",question:"Which quotation from the interviews best illustrates the journalist's claim?",options:["\"Line-standing strikes some as inherently unfair, but it is just a paid service like anything else. Lobbyist line-standing is essentially based on the same principle.\"","\"Lobbyists should be made to wait in line themselves like everyone else. Otherwise, lobbying in support for political issues will become increasingly elitist; as those with more money can essentially pay their way into hearings while they continue lobbying for their cause elsewhere.\"","\"Line-standing really isn't a matter of concern to serious politicians. If the payoffs merely entail securing early ownership of cutting-edge electronics, the larger societal impact of such a practice is likely insignificant.\"","\"Whether or not lobbyist line-standing is fair is ultimately less important than the fact that the practice creates more paid work in our city.\""],answer:"B",points:2.5}
      },
      act:{
        easy:{id:"ae1",question:"The main purpose of the third paragraph (lines 13–22) of the Holmes passage is to:",options:["Indicate why Holmes preferred rhythm and blues to Sinatra songs.","Establish that Holmes's parents disapproved of his interest in music.","Reveal that Holmes was considered a musical prodigy.","Describe what inspired Holmes to start playing music."],answer:"D",points:1},
        medium:{id:"ae2",question:"The quotation from lines 10–12 (\"We grew up in that kind of atmosphere...\") mainly serves to:",options:["Explore the difficulty of growing up in a highly driven community","Share an amusing anecdote about growing up in Gordon Heights","Discuss the difficulty of pursuing music in a highly academic environment","Offer a specific explanation of a description of Gordon Heights from an earlier claim"],answer:"D",points:2},
        hard:{id:"ae3",question:"The main purpose of the Holmes passage is to:",options:["Explain why Holmes's musical tastes gradually changed over time.","Describe how Holmes's hectic professional life affects his personal life.","Highlight the different instruments Holmes mastered in becoming a famous musician.","Document how Holmes eventually became an enterprising bandleader."],answer:"D",points:2.5}
      }
    }
  ],
  grammar:[
    {
      id:"g_punc", concept:"Punctuation", section:"Grammar & Language",
      sat:{
        easy:{id:"gsp1",passage:"Although the oldest airships, or \"blimps,\" made passenger air travel commercially possible, they were plagued with problems. Worst of all was the safety concern: hydrogen gas is extremely flammable. Any spark or flame that came near the gas could cause a horrific _______ exactly what happened.",question:"Which choice completes the text so that it conforms to the conventions of Standard English?",options:["explosion; which is","explosion: which is","explosion, which is","explosion which—is"],answer:"C",points:1},
        medium:{id:"gsp2",passage:"In her analysis of Edith Wharton's The House of Mirth (1905), scholar Candace Waid observes that the novel depicts the upper classes of New York society as \"consumed by the appetite of a soulless _______ an apt assessment given that The House of Mirth is set during the Gilded Age.",question:"Which choice completes the text so that it conforms to the conventions of Standard English?",options:["materialism\"; and","materialism\" and","materialism,\"","materialism\""],answer:"D",points:2},
        hard:{id:"gsp3",passage:"Researchers studying magnetosensation have determined why some soil-dwelling roundworms in the Southern Hemisphere move in the opposite direction of Earth's magnetic field when searching for _______ in the Northern Hemisphere, the magnetic field points down, into the ground, but in the Southern Hemisphere, it points up, toward the surface and away from worms' food sources.",question:"Which choice completes the text so that it conforms to the conventions of Standard English?",options:["food:","food,","food while","food"],answer:"A",points:2.5}
      },
      act:{
        easy:{id:"gap1",question:"She explained that to attract prey, glowworms (not really worms at all, but the larval stage of a fungus gnat) emit light through their translucent skin; [21] via a cellular chemical reaction. At [21], the best choice is:",options:["NO CHANGE (skin; via)","skin, and via","skin. Via","skin via"],answer:"D",points:1},
        medium:{id:"gap2",question:"An ornate forty-foot-tall tower sat an armillary sphere, [68] or a nest of metal rings representing celestial reference points—that rotated in sync with the earth, enabling precise astronomical observations. At [68], the best choice is:",options:["NO CHANGE (sphere, or)","sphere—","sphere:","sphere,"],answer:"A",points:2},
        hard:{id:"gap3",passage:"My roses are not your average hybrid-tea roses. Mine are antique roses, [34] old, or heirloom varieties, that have existed in gardens worldwide for centuries.",question:"At [34], the best choice is:",options:["NO CHANGE (roses, old, or heirloom varieties,)","roses, old or heirloom varieties,","roses old, or heirloom varieties","roses, old or heirloom varieties"],answer:"A",points:2.5}
      }
    },
    {
      id:"g_word", concept:"Word Choice & Precision", section:"Grammar & Language",
      sat:{
        easy:{id:"gsw1",passage:"The Babylonian king Hammurabi, who reigned between 1792 and 1750 B.C.E., recorded one of the first systems of laws. The 282 edicts of the code of Hammurabi all follow an \"If… then…\" structure that _______ the conditions required before a punishment can be imposed.",question:"Which choice completes the text so that it conforms to the conventions of Standard English?",options:["establish","establishes","established","are establishing"],answer:"B",points:1},
        medium:{id:"gsw2",passage:"The Cambrian explosion gets its name from the sudden appearance and rapid diversification of animal remains in the fossil record about 541 million years ago. Some scientists argue that this _______ change in the fossil record might be because of a shift in many organisms to body types that were more likely to be preserved.",question:"Which choice completes the text with the most logical and precise word or phrase?",options:["catastrophic","elusive","abrupt","imminent"],answer:"C",points:2},
        hard:{id:"gsw3",passage:"According to a US tax policy expert, state taxes are _______ other factors when considering an interstate move. Even significant differences in state taxation have almost no effect on most people's decisions, while differences in employment opportunities, housing availability, and climate are strong influences.",question:"Which choice completes the text with the most logical and precise word or phrase?",options:["consistent with","representative of","overshadowed by","irrelevant to"],answer:"C",points:2.5}
      },

function allConcepts(){
  const a=[];
  [...QUESTIONS.reading,...QUESTIONS.grammar,...QUESTIONS.math].forEach(c=>a.push(c));
  if(S.showSci) QUESTIONS.science.forEach(c=>a.push(c));

function render(){
  const r=document.getElementById("root");
  if(S.page==="cover") r.innerHTML=renderCover();

  else if(S.page==="results") r.innerHTML=renderResults();

}

      if(c.act[d]){total++;if(S.answers[c.act[d].id]!==undefined)answered++;}
    });
  });
  const pct=total?Math.round(answered/total*100):0;

  const sections={
    "Reading":{badge:"badge-reading",concepts:[]},

    "Science (Optional)":{badge:"badge-science",concepts:[]}

  concepts.forEach(c=>{

  const HOLMES_PASSAGE=`<div class="concept-block" style="margin-bottom:1.5rem;">
    <div class="concept-title" style="background:#fff8e8;border-bottom-color:#f0e0a0;">

      <span style="font-size:12px;font-weight:400;color:#999;margin-left:8px;">SAT questions in this section include their own short passages and do not require this text.</span>
    </div>
    <div style="padding:1.25rem;columns:2;column-gap:2rem;font-size:13px;line-height:1.8;color:#333;">
      <p style="margin-bottom:.75rem;"><strong>Passage II</strong></p>
      <p style="margin-bottom:.75rem;font-size:11px;color:#888;font-style:italic;">INFORMATIONAL: This passage is adapted from the article "Notes from a Wedding" by Lauren Wilcox Puchowski (©2010 by Lauren Wilcox Puchowski).</p>
      <p style="margin-bottom:.75rem;">It was never Kenney Holmes's intention to become a wedding singer. The grandson of West Indian immigrants, Holmes was raised in Gordon Heights, on Long Island, in what he calls "a small black community founded by like-minded thinkers," families of immigrants and Southern blacks who, as Holmes says, "didn't come here to fool around" and who handed down to their children their own keen sense of ambition.</p>
      <p style="margin-bottom:.75rem;">"We grew up in that kind of atmosphere," he says, "of positive thinking, of getting educated, whether or not you had a degree."</p>
      <p style="margin-bottom:.75rem;">Like any American boy in the 1950s and '60s, he was fascinated with popular music: he listened to the area's one radio station, which "mostly played Sinatra"; sometimes in the evenings, with a coat hanger stuck into the top of his portable radio, he could pick up a faint signal from WWRL, a rhythm and blues station in New York City. When he was a teenager, his brother brought home a guitar. "I was 16, it was a Sunday night," he says. "I sat down and played 'I Can't Get No Satisfaction.' I was addicted."</p>
      <p style="margin-bottom:.75rem;">While he was not a virtuoso, he was, he discovered, good at making money at it. He learned three songs — "Satisfaction" by the Rolling Stones, "And I Love Her" by the Beatles, and "Shotgun" by Junior Walker and the All Stars — and formed a band. "We went out and sold it," he says. "We could play those three songs all night. We got pretty popular out on the island, playing battle of the bands, fire halls, high school proms, for $10 a night."</p>
      <p style="margin-bottom:.75rem;">Still, a career as a musician was not what he, or his family, had had in mind. Over the next few years, he says: "I did everything I could not to be a guitar player." Thinking he would be a psychiatrist, he took pre-med classes but didn't complete a degree. Along the way, he continued playing nightclubs and parties.</p>
      <p style="margin-bottom:.75rem;">In his mid-20s, he visited his brother in Washington, D.C. Washington looked, to Holmes, like a good place to be an ambitious, career-minded black man, but it also had a thriving music scene in nightclubs and hotel lounges, and the next 15 years played out as a sort of tussle between his creative pursuits and his more business-driven impulses. Trying to work his way up in the music scene, he played five and six nights a week in nightclubs and wrote his own music. He started a recording studio called Sound Ideas, which trawled local talent for the makings of a hit song, but he found the pickings slim.</p>
      <p style="margin-bottom:.75rem;">The club scene, after a long while, began to wear on him, as well. Unwilling to resign himself to the life of a starving artist, when an agent approached him in the early '90s about specializing in wedding and private parties, Holmes decided to try it.</p>
      <p style="margin-bottom:.75rem;">It was a revelation. "I could make in one night what I used to make in five," he says. "And it changed the culture of what I was doing."</p>
      <p style="margin-bottom:.75rem;">Holmes was well-suited for the role of event bandleader. His production skills helped him control his band's sound, and his familiarity with country, big-band and classical music made him popular with audiences who wanted, as he says, "a tango or a Viennese waltz," as well as Wilson Pickett.</p>
      <p style="margin-bottom:.75rem;">Because business ebbs and flows with the seasons and the economy, Holmes has always kept a variety of sidelines, including a job driving a limousine for nine years to put his oldest daughter through a private high school and college. These days, at gigs, he hands out a stack of million-dollar "bills" printed with his image and his current enterprises: bandleader, commercial mortgage broker, hard money lender.</p>
      <p style="margin-bottom:.75rem;">Holmes uses as many as eight musicians and two singers for weddings. He accepts turnover as a fact of life, but his current core lineup has, in the mercurial world of part-time performers, been fairly steady. Sam Brawner, the drummer, and Atiba Taylor, the sax player, have played with him for three and four years, respectively, and Bruce Robinson, the keyboardist, has played with him for 15.</p>
      <p style="margin-bottom:.75rem;">This is perhaps partly because Holmes insists on making music. During performances, he lets his musicians take the lead and uses specialized, stripped-down tracks, called digital sequences, to set the tempo and fill in musical parts when necessary, ultimately preferring the messy alchemy of live music to something more canned. The musicians say that this is in contrast to other bandleaders they've worked for, who often rely heavily on recordings and use musicians more as visual props. Holmes's respect for the music endears him to his musicians. "These guys play from the heart," says Robinson. "They're not just trying to get through the gig."</p>
    </div>
  </div>`;

  let html=`
  <div style="background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1.75rem;">
    <h2 style="font-size:16px;font-weight:600;margin-bottom:.85rem;color:#1a1a1a;">How to Take This Diagnostic</h2>

        SAT and ACT questions for each concept appear side by side so you can compare how each test approaches the same skill.
      </div>
      <div style="background:#f8f7f3;border-radius:8px;padding:.75rem;font-size:13px;color:#444;line-height:1.6;">
        <strong style="display:block;margin-bottom:.25rem;font-size:12px;color:#888;letter-spacing:.03em;">TIMING</strong>
        Start a timer when you begin each section and record your time at the end. Pacing is factored into your score report.
      </div>
      <div style="background:#f8f7f3;border-radius:8px;padding:.75rem;font-size:13px;color:#444;line-height:1.6;">
        <strong style="display:block;margin-bottom:.25rem;font-size:12px;color:#888;letter-spacing:.03em;">SCORE REPORT</strong>
        When you have finished, click Submit at the bottom of the page to generate a full score report. You will have the option to email your results directly to your college counselor, tutor, or parents.
      </div>
    </div>
    <p style="font-size:12px;color:#aaa;line-height:1.6;">Answer each question as naturally as you can without rushing. This diagnostic is designed to identify where you are right now, not to be a test you pass or fail. The more honestly you engage with it, the more useful your results will be.</p>
  </div>

  <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
  <div class="progress-meta"><span>${answered} of ${total} answered</span><span>${pct}% complete</span></div>`;

  Object.entries(sections).forEach(([name,info])=>{
    if(!info.concepts.length)return;
    html+=`<div class="section-header">
      <span class="section-badge ${info.badge}">${name==="Science (Optional)"?"OPTIONAL":name.toUpperCase()}</span>
      <h2>${name==="Reading"?"Reading &amp; Literature":name==="Grammar & Language"?"Grammar &amp; Language":name==="Math"?"Mathematics":"Science Reasoning — Bonus"}</h2>
    </div>`;

    // For Reading: passage first, then concept blocks with ACT col on right referencing it
    if(name==="Reading") html+=HOLMES_PASSAGE;

    info.concepts.forEach((c,ci)=>{
      // For Reading concepts: swap columns so ACT (which references the passage above) is on the LEFT
      // and SAT (self-contained passages) is on the RIGHT -- puts ACT closer to the passage visually
      const isReading=(name==="Reading");
      const leftTest=isReading?"act":"sat";
      const rightTest=isReading?"sat":"act";
      const leftLabel=isReading?`<span class="col-tag tag-act">ACT</span> Revised ACT — refer to passage above`:`<span class="col-tag tag-sat">SAT</span> Digital SAT`;
      const rightLabel=isReading?`<span class="col-tag tag-sat">SAT</span> Digital SAT — each question includes its own passage`:`<span class="col-tag tag-act">ACT</span> Revised ACT`;

      html+=`<div class="concept-block">
        <div class="concept-title">${c.concept}</div>
        <div class="question-grid">
          <div class="question-col">
            <div class="col-header">${leftLabel}</div>
            ${renderDiff(c[leftTest].easy,"easy")}${renderDiff(c[leftTest].medium,"medium")}${renderDiff(c[leftTest].hard,"hard")}

        ${(name==="Math"&&ci===info.concepts.length-1)?renderTimingRow("math"):""}
      </div>`;
    });
  });

  html+=`<div class="submit-zone">
    <button class="submit-btn" data-a="submit" ${answered===0?"disabled":""}>Submit &amp; Generate Score Report</button>
    <p style="margin-top:.75rem;font-size:13px;color:#888;">When you are ready, click above to generate your personalized score report. Your report will include estimated SAT and ACT score ranges, a concept-by-concept performance breakdown, and a plain-English summary you can share with your college counselor, tutor, or parents via email.</p>
    <p style="margin-top:.4rem;font-size:12px;color:#bbb;">Any unanswered questions will be recorded as skipped and will not count against your score.</p>
  </div>`;
  return html;
}

function renderTimingRow(sec){
  const opts=TIMING_OPTS[sec];
  const label=sec==="verbal"?"Reading &amp; Grammar section time:":"Math section time:";
  return`<div class="timing-row">
    <span class="timing-label">${label}</span>
    <div class="timing-options">
      ${opts.map((o,i)=>`<button class="timing-btn${S.timing[sec]===i?" selected":""}" data-a="timing" data-s="${sec}" data-i="${i}">${o.l}</button>`).join("")}
    </div>
  </div>`;
}

function renderDiff(q,diff){
  if(!q)return`<div class="diff-row"><div class="diff-label"><span class="diff-dot dot-${diff}"></span>${diff[0].toUpperCase()+diff.slice(1)} — not available</div></div>`;
  const sel=S.answers[q.id];
  const letters=q.options.length===5?["A","B","C","D","E"]:["A","B","C","D"];
  return`<div class="diff-row">
    <div class="diff-label"><span class="diff-dot dot-${diff}"></span>${diff[0].toUpperCase()+diff.slice(1)} &nbsp;·&nbsp; ${q.points}pt</div>
    ${q.passage?`<div class="q-passage">${q.passage.replace(/\n/g,"<br>")}</div>`:""}
    <div class="q-text">${q.question}</div>
    <div class="options">
      ${q.options.map((opt,i)=>{const l=letters[i];const s=sel===l;return`<button class="option-btn${s?" selected":""}" data-a="ans" data-id="${q.id}" data-v="${l}"><span class="opt-letter">${l}.</span>${opt}</button>`;}).join("")}
    </div>
  </div>`;
}

function renderResults(){
  const concepts=allConcepts();
  let vE=0,vM=0,mE=0,mM=0;
  const cResults=[];
  const tb={verbal:S.timing.verbal!==null?TIMING_OPTS.verbal[S.timing.verbal].v:0,math:S.timing.math!==null?TIMING_OPTS.math[S.timing.math].v:0};

  concepts.forEach(c=>{
    const isMath=c.section==="Math";
    const dots=[];let ce=0,cm=0;
    ["easy","medium","hard"].forEach(d=>{
      ["sat","act"].forEach(t=>{
        const q=c[t][d];if(!q)return;
        cm+=q.points;
        if(isMath)mM+=q.points; else vM+=q.points;
        const ans=S.answers[q.id];
        if(ans===undefined){dots.push("s");return;}
        if(ans===q.answer){ce+=q.points;if(isMath)mE+=q.points;else vE+=q.points;dots.push("c");}
        else dots.push("i");
      });
    });
    const pct=cm>0?Math.round(ce/cm*100):0;
    cResults.push({name:c.concept,section:c.section,pct,dots,ce,cm});
  });

  const vAdj=Math.max(0,vE+tb.verbal);
  const mAdj=Math.max(0,mE+tb.math);
  const vRange=getRange(vAdj,SAT_V_RANGE);
  const mRange=getRange(mAdj,SAT_M_RANGE);

  // ACT score estimation
  // ACT is scored 1-36. We map verbal+math combined performance to an ACT composite estimate.
  // ACT English (1-36) mapped from verbal performance, ACT Math (1-36) mapped from math performance.
  const ACT_E_RANGE=[[0,20,"11–14"],[21,35,"15–17"],[36,50,"18–20"],[51,60,"21–23"],[61,70,"24–26"],[71,80,"27–29"],[81,90,"30–32"],[91,100,"33–36"]];
  const ACT_M_RANGE=[[0,20,"11–14"],[21,35,"15–17"],[36,50,"18–20"],[51,60,"21–23"],[61,70,"24–26"],[71,80,"27–29"],[81,90,"30–32"],[91,100,"33–36"]];
  function getACTRange(pct,ranges){for(let i=ranges.length-1;i>=0;i--){if(pct>=ranges[i][0])return ranges[i][2];}return"11–14";}
  const vPct=vM>0?Math.round(vAdj/vM*100):0;
  const mPct=mM>0?Math.round(mAdj/mM*100):0;
  const actERange=getACTRange(vPct,ACT_E_RANGE);
  const actMRange=getACTRange(mPct,ACT_M_RANGE);
  // ACT composite is average of four sections; we have two so approximate
  const actELow=parseInt(actERange.split("–")[0]);
  const actEHigh=parseInt(actERange.split("–")[1]);
  const actMLow=parseInt(actMRange.split("–")[0]);
  const actMHigh=parseInt(actMRange.split("–")[1]);
  const actCompLow=Math.round((actELow+actMLow)/2);
  const actCompHigh=Math.round((actEHigh+actMHigh)/2);
  const actCompRange=actCompLow+"–"+actCompHigh;

  const strong=cResults.filter(r=>r.pct>=70).sort((a,b)=>b.pct-a.pct);
  const growth=cResults.filter(r=>r.pct<70).sort((a,b)=>a.pct-b.pct);

  function pC(p){return p>=70?"pct-s":p>=40?"pct-o":"pct-w";}

  function cRow(r){
    // Build a readable per-question breakdown instead of dots
    const diffs=["easy","medium","hard"];
    const tests=["sat","act"];
    const labels=["SAT Easy","ACT Easy","SAT Med","ACT Med","SAT Hard","ACT Hard"];
    let cells="";
    let idx=0;
    diffs.forEach(d=>{
      tests.forEach(t=>{
        const status=r.dots[idx];
        const col=status==="c"?"#4a9e3f":status==="i"?"#e04040":"#ccc";
        const symbol=status==="c"?"✓":status==="i"?"✗":"–";
        cells+=`<td style="text-align:center;padding:4px 6px;font-size:12px;color:${col};font-weight:600;">${symbol}</td>`;
        idx++;
      });
    });
    return`<div class="concept-result-row" style="flex-direction:column;align-items:flex-start;gap:6px;">
      <div style="display:flex;align-items:center;gap:10px;width:100%;">
        <span class="cr-section">${r.section}</span>
        <span class="cr-name" style="font-weight:500;">${r.name}</span>
        <span class="cr-pct ${pC(r.pct)}" style="margin-left:auto;">${r.pct}%</span>
      </div>
      <table style="width:100%;border-collapse:collapse;background:#f8f7f3;border-radius:6px;overflow:hidden;">
        <tr>${labels.map(l=>`<th style="font-size:10px;color:#999;font-weight:600;padding:3px 6px;text-align:center;">${l}</th>`).join("")}</tr>
        <tr>${cells}</tr>
      </table>
    </div>`;
  }

  let easy={c:0,t:0},med={c:0,t:0},hard={c:0,t:0};
  concepts.forEach(c=>{
    ["sat","act"].forEach(t=>{
      ["easy","medium","hard"].forEach(d=>{
        const q=c[t][d];if(!q)return;
        const b=d==="easy"?easy:d==="medium"?med:hard;
        b.t++;if(S.answers[q.id]===q.answer)b.c++;
      });
    });
  });

  function bar(label,d){
    const p=d.t?Math.round(d.c/d.t*100):0;
    const col=p>=70?"#4a9e3f":p>=40?"#c47a15":"#b03030";
    return`<div class="diff-bar-row">
      <div class="diff-bar-meta"><span>${label}</span><span style="color:${col};font-weight:500">${p}% (${d.c}/${d.t})</span></div>
      <div class="diff-bar-track"><div class="diff-bar-fill" style="width:${p}%;background:${col}"></div></div>
    </div>`;
  }

  // Generate summary paragraph
  function generateSummary(){
    const easyPct=easy.t?Math.round(easy.c/easy.t*100):0;
    const medPct=med.t?Math.round(med.c/med.t*100):0;
    const hardPct=hard.t?Math.round(hard.c/hard.t*100):0;
    const topStrong=strong.slice(0,2).map(r=>r.name);
    const topGrowth=growth.slice(0,2).map(r=>r.name);
    const overallPct=Math.round(((vE+mE)/(vM+mM||1))*100);

    // Overall performance descriptor
    const perfDesc=overallPct>=80?"strong overall performance":overallPct>=60?"solid overall performance":overallPct>=40?"developing foundation":"significant room for growth";

    // SAT verbal descriptor
    const satVLow=parseInt(vRange.split("–")[0]);
    const satVDesc=satVLow>=700?"competitive":satVLow>=600?"solid":satVLow>=500?"developing":"early-stage";

    // Timing observation
    let timingNote="";
    if(S.timing.verbal!==null&&TIMING_OPTS.verbal[S.timing.verbal].v<0) timingNote=" Pacing on the Reading and Grammar section was on the faster side, which may have affected accuracy.";
    else if(S.timing.math!==null&&TIMING_OPTS.math[S.timing.math].v<0) timingNote=" Pacing on the Math section was on the faster side, suggesting that slowing down and checking work could improve the Math score.";
    else if(S.timing.verbal!==null&&TIMING_OPTS.verbal[S.timing.verbal].v>=2) timingNote=" The Reading and Grammar section took longer than the target window, which is something to address in prep.";
    else if(S.timing.math!==null&&TIMING_OPTS.math[S.timing.math].v>=2) timingNote=" The Math section took longer than the target window, suggesting that building speed on core problem types should be a priority.";

    // Difficulty pattern
    let diffNote="";
    if(easyPct>=80&&medPct>=60&&hardPct<40) diffNote=" Performance was strong on easier questions but dropped significantly on harder ones, which is typical and means the foundational knowledge is there — the priority is building the skills to handle more complex applications.";
    else if(easyPct>=80&&medPct<50) diffNote=" Performance was strong on easy questions but dropped at the medium level, suggesting some core conceptual gaps that targeted practice can close quickly.";
    else if(easyPct<60) diffNote=" There are some gaps even at the foundational level, which is useful to know early — it means we can focus prep on the core concepts that will unlock the most improvement.";
    else if(hardPct>=60) diffNote=" Notably, performance held up well even on harder questions, which is a good sign for the ceiling of improvement.";

    // Strengths and growth
    let strengthNote=topStrong.length>0?` The strongest areas were ${topStrong.join(" and ")}.`:"";
    let growthNote=topGrowth.length>0?` The highest-priority areas to address are ${topGrowth.join(" and ")}, where performance was below the target threshold.`:" Performance was strong across all concepts tested.";

    return`Based on this diagnostic, this student demonstrated ${perfDesc}, with an estimated SAT score range of ${vRange} in Reading and Writing and ${mRange} in Math, and an estimated ACT composite in the ${actCompRange} range.${strengthNote}${growthNote}${diffNote}${timingNote} These results give us a clear starting point for building a focused study plan, and the specificity of this breakdown means we can target the right areas from the very first session rather than covering ground the student has already mastered.`;
  }

  // Generate plain-text email body
  function generateEmailBody(){
    const summary=generateSummary();
    const strongList=strong.map(r=>`  - ${r.name}: ${r.pct}%`).join("\n");
    const growthList=growth.map(r=>`  - ${r.name}: ${r.pct}%`).join("\n");
    const easyPct=easy.t?Math.round(easy.c/easy.t*100):0;
    const medPct=med.t?Math.round(med.c/med.t*100):0;
    const hardPct=hard.t?Math.round(hard.c/hard.t*100):0;

    return`SAT & ACT DIAGNOSTIC RESULTS
Prepared by Michael Hirsch Test Prep
mlheducation.github.io/diagnostic/sat_act_diagnostic.html

SUMMARY
${summary}

ESTIMATED SCORE RANGES
SAT Reading & Writing: ${vRange} (out of 800)
SAT Math: ${mRange} (out of 800)

ACT Estimated Composite: ${actCompRange} (out of 36)

Timing adjustment applied: Verbal ${tb.verbal>=0?"+":""}${tb.verbal}, Math ${tb.math>=0?"+":""}${tb.math}

DIFFICULTY BREAKDOWN
Easy questions: ${easyPct}% correct
Medium questions: ${medPct}% correct
Hard questions: ${hardPct}% correct

STRENGTHS (70% or above)
${strongList||"  No concepts at mastery level yet."}

GROWTH AREAS (below 70%)
${growthList||"  Strong across all concepts."}

---
To discuss these results or schedule tutoring sessions, contact Michael Hirsch at mlheducation.github.io`;
  }

  // Store email generator globally so bind() can access it after render
  window.generateEmailBodyGlobal = generateEmailBody;

  return`<div class="results-page">
    <div class="results-header">
      <h1>Your Diagnostic Results</h1>
      <p>This breakdown shows how you performed on every concept tested, broken down by difficulty level for both the SAT and ACT. Use this to understand where to focus your prep.</p>
    </div>

    <div style="background:#fff8e8;border:1px solid #f0e0a0;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.5rem;font-size:13px;color:#7a5000;line-height:1.6;">
      <strong>How to read these estimates:</strong> The score ranges below are based on your performance on this diagnostic relative to the full SAT and ACT scoring scales. Because this is a shorter diagnostic rather than a full-length test, treat these as directional estimates, not exact predictions. They are most useful for understanding roughly where you stand and which test may suit you better.
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;">
      <div style="background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;">
        <div style="font-size:12px;font-weight:600;letter-spacing:.04em;color:#185fa5;margin-bottom:.75rem;">SAT ESTIMATED SCORE RANGE</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;">
          <div style="background:#f0f6ff;border-radius:8px;padding:.75rem;text-align:center;">
            <div style="font-size:11px;color:#888;margin-bottom:.25rem;">Reading &amp; Writing</div>
            <div style="font-size:22px;font-weight:500;color:#185fa5;">${vRange}</div>
            <div style="font-size:11px;color:#aaa;margin-top:.2rem;">out of 800</div>
          </div>
          <div style="background:#f0f6ff;border-radius:8px;padding:.75rem;text-align:center;">
            <div style="font-size:11px;color:#888;margin-bottom:.25rem;">Math</div>
            <div style="font-size:22px;font-weight:500;color:#185fa5;">${mRange}</div>
            <div style="font-size:11px;color:#aaa;margin-top:.2rem;">out of 800</div>
          </div>
        </div>
        <div style="margin-top:.75rem;font-size:11px;color:#aaa;text-align:center;">Timing adjustment: Verbal ${tb.verbal>=0?"+":""}${tb.verbal} · Math ${tb.math>=0?"+":""}${tb.math}</div>
      </div>

      <div style="background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;">
        <div style="font-size:12px;font-weight:600;letter-spacing:.04em;color:#8c2456;margin-bottom:.75rem;">ACT ESTIMATED SCORE RANGE</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;">
          <div style="background:#fdf0f5;border-radius:8px;padding:.75rem;text-align:center;">
            <div style="font-size:11px;color:#888;margin-bottom:.25rem;">English</div>
            <div style="font-size:22px;font-weight:500;color:#8c2456;">${actERange}</div>
            <div style="font-size:11px;color:#aaa;margin-top:.2rem;">out of 36</div>
          </div>
          <div style="background:#fdf0f5;border-radius:8px;padding:.75rem;text-align:center;">
            <div style="font-size:11px;color:#888;margin-bottom:.25rem;">Math</div>
            <div style="font-size:22px;font-weight:500;color:#8c2456;">${actMRange}</div>
            <div style="font-size:11px;color:#aaa;margin-top:.2rem;">out of 36</div>
          </div>
        </div>
        <div style="margin-top:.75rem;font-size:11px;color:#aaa;text-align:center;">Estimated composite: ${actCompRange} out of 36</div>
      </div>
    </div>

    <div class="results-section">
      <h3>Strengths <span style="font-size:13px;font-weight:400;color:#999;">— concepts where you scored 70% or higher</span></h3>
      <p style="font-size:13px;color:#888;margin-bottom:.75rem;">These are areas you have a solid foundation in. In tutoring we will maintain these while focusing energy elsewhere.</p>
      ${strong.length?strong.map(cRow).join(""):`<p style="font-size:13px;color:#888;padding:.5rem 0;">No concepts at mastery level yet — that is completely normal at the start of prep and exactly what we are here to work on.</p>`}
    </div>

    <div class="results-section">
      <h3>Growth areas <span style="font-size:13px;font-weight:400;color:#999;">— concepts where you scored below 70%</span></h3>
      <p style="font-size:13px;color:#888;margin-bottom:.75rem;">These are your highest-priority focus areas. The concepts listed first are where you lost the most points.</p>
      ${growth.length?growth.map(cRow).join(""):`<p style="font-size:13px;color:#888;padding:.5rem 0;">Strong across all concepts — this is an excellent diagnostic result.</p>`}
    </div>

    <div class="results-section">
      <h3>How far does your knowledge go?</h3>
      <p style="font-size:13px;color:#888;margin-bottom:.75rem;">Each concept was tested at three difficulty levels. This shows how your accuracy changes as questions get harder.</p>
      <div class="diff-breakdown">${bar("Easy questions — foundational skills",easy)}${bar("Medium questions — core competency",med)}${bar("Hard questions — advanced application",hard)}</div>
    </div>

    <div style="background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-top:1.5rem;">
      <div style="font-size:12px;font-weight:600;letter-spacing:.04em;color:#444;margin-bottom:.75rem;">RESULTS SUMMARY</div>
      <p style="font-size:14px;line-height:1.8;color:#333;">${generateSummary()}</p>
    </div>

    <div style="background:#f0f6ff;border:1px solid #b5d4f4;border-radius:10px;padding:1rem 1.25rem;margin-top:1.25rem;">
      <div style="font-size:13px;color:#0c447c;line-height:1.6;margin-bottom:.85rem;"><strong>Share these results</strong> — send a full summary to your college counselor, parents, or tutor. The email will include your score estimates, strengths, growth areas, and the summary paragraph above.</div>
      <button class="btn-primary" data-a="email" style="font-size:14px;padding:10px 22px;">Email My Results</button>
    </div>

    <div class="retry-zone">
      <button class="btn-outline" data-a="retry">Retake Diagnostic</button>
      <button class="btn-outline" data-a="review">Review My Answers</button>
    </div>
  </div>`;
}

function bind(){
  document.querySelectorAll("[data-a]").forEach(el=>{
    el.onclick=e=>{
      e.stopPropagation();
      const a=el.dataset.a;
      if(a==="start"){S.page="test";render();scrollTo(0,0);}
      else if(a==="sci"){S.showSci=!S.showSci;render();}
      else if(a==="ans"){
        const prev=S.answers[el.dataset.id];
        if(prev===el.dataset.v) delete S.answers[el.dataset.id];
        else S.answers[el.dataset.id]=el.dataset.v;
        render();
        setTimeout(()=>{const b=document.querySelector(`[data-id="${el.dataset.id}"]`);if(b)b.scrollIntoView({block:"nearest",behavior:"smooth"});},50);
      }
      else if(a==="timing"){S.timing[el.dataset.s]=parseInt(el.dataset.i);render();}
      else if(a==="submit"){S.page="results";render();scrollTo(0,0);}
      else if(a==="retry"){S={page:"test",answers:{},timing:{verbal:null,math:null},showSci:S.showSci};render();scrollTo(0,0);}
      else if(a==="review"){S.page="test";render();scrollTo(0,0);}
      else if(a==="email"){
        const body=encodeURIComponent(generateEmailBodyGlobal());
        const subject=encodeURIComponent("SAT & ACT Diagnostic Results");
        const mailtoLink=`mailto:?subject=${subject}&body=${body}`;
        // Use top-level window to escape iframe restrictions
        try{ window.top.location.href=mailtoLink; }
        catch(e){ window.open(mailtoLink,"_blank"); }
      }
    };
  });
}

render();
</script>
</body>
</html>
